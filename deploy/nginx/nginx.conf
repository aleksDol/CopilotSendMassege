user nginx;
worker_processes auto;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  log_format json_combined escape=json
    '{"time":"$time_iso8601","remote_addr":"$remote_addr","request_id":"$request_id","request":"$request","status":$status,"body_bytes_sent":$body_bytes_sent,"request_time":$request_time,"upstream_addr":"$upstream_addr","upstream_response_time":"$upstream_response_time","http_referer":"$http_referer","http_user_agent":"$http_user_agent"}';

  access_log /dev/stdout json_combined;
  error_log /dev/stderr warn;

  limit_req_zone $binary_remote_addr zone=api_rate_limit:10m rate=25r/s;

  client_max_body_size 20m;

  include /etc/nginx/conf.d/*.conf;
}
