services:
  nginx:
    image: nginx:1.27-alpine
    container_name: ai-sales-nginx
    restart: unless-stopped
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_healthy
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
      - "${NGINX_HTTPS_PORT:-8443}:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      NGINX_CLIENT_MAX_BODY_SIZE: ${NGINX_CLIENT_MAX_BODY_SIZE:-20m}
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/templates:/etc/nginx/templates:ro
      - ./deploy/nginx/entrypoint.sh:/entrypoint.sh:ro
      - certbot_www:/var/www/certbot
      - letsencrypt_certs:/etc/letsencrypt
    command: ["/bin/sh", "-c", "/bin/sh /entrypoint.sh"]
    healthcheck:
      test: ["CMD-SHELL", "kill -0 $$(cat /var/run/nginx.pid 2>/dev/null) 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - public
      - app_internal

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
        NEXT_PUBLIC_SALES_TELEGRAM_URL: ${NEXT_PUBLIC_SALES_TELEGRAM_URL}
        NEXT_PUBLIC_YANDEX_METRIKA_ID: ${NEXT_PUBLIC_YANDEX_METRIKA_ID:-108223264}
        NEXT_PUBLIC_TOP_MAIL_RU_ID: ${NEXT_PUBLIC_TOP_MAIL_RU_ID:-3752150}
    container_name: ai-sales-web
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_YANDEX_METRIKA_ID: ${NEXT_PUBLIC_YANDEX_METRIKA_ID:-108223264}
      NEXT_PUBLIC_TOP_MAIL_RU_ID: ${NEXT_PUBLIC_TOP_MAIL_RU_ID:-3752150}
      PORT: 3000
    expose:
      - "3000"
    healthcheck:
      disable: true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - app_internal

  # Secrets (DATABASE_URL, JWT_SECRET, …) must live in .env.production — do not pass them as
  # ${VAR} here: an unset host .env would interpolate to "" and override env_file.
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: ai-sales-api
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 4000
      API_PORT: 4000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      # Use :-defaults so unset host .env does not override .env.production with empty strings.
      ENABLE_LEADRADAR: ${ENABLE_LEADRADAR:-false}
      ENABLE_LEADRADAR_QUEUE: ${ENABLE_LEADRADAR_QUEUE:-false}
      ENABLE_LEADRADAR_INGESTION_IN_API: ${ENABLE_LEADRADAR_INGESTION_IN_API:-true}
      TELEGRAM_WORKER_URL: http://telegram-worker:8080
      TELEGRAM_WORKER_TIMEOUT_MS: ${TELEGRAM_WORKER_TIMEOUT_MS:-15000}
      TELEGRAM_WORKER_RESOLVE_CHAT_TIMEOUT_MS: ${TELEGRAM_WORKER_RESOLVE_CHAT_TIMEOUT_MS:-90000}
      OPENAI_MODEL_REPLY: ${OPENAI_MODEL_REPLY:-gpt-4o-mini}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      AI_PROMPT_VERSION: ${AI_PROMPT_VERSION:-v1}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      AI_REQUEST_TIMEOUT_MS: ${AI_REQUEST_TIMEOUT_MS:-12000}
      AI_MAX_CONTEXT_MESSAGES: ${AI_MAX_CONTEXT_MESSAGES:-20}
      REDIS_CACHE_TTL: ${REDIS_CACHE_TTL:-45}
      AI_WORKER_CONCURRENCY: ${AI_WORKER_CONCURRENCY:-2}
      TELEGRAM_WORKER_CONCURRENCY: ${TELEGRAM_WORKER_CONCURRENCY:-2}
      FOLLOW_UP_UNANSWERED_HOURS: ${FOLLOW_UP_UNANSWERED_HOURS:-24}
      FOLLOW_UP_WARM_LEAD_HOURS: ${FOLLOW_UP_WARM_LEAD_HOURS:-48}
      DASHBOARD_ACTIVITY_WINDOW_DAYS: ${DASHBOARD_ACTIVITY_WINDOW_DAYS:-7}
      LEADRADAR_MULTI_CHAT_DEDUPE_WINDOW_HOURS: ${LEADRADAR_MULTI_CHAT_DEDUPE_WINDOW_HOURS:-3}
      LEADRADAR_MULTI_CHAT_SCORE_BONUS: ${LEADRADAR_MULTI_CHAT_SCORE_BONUS:-35}
    expose:
      - "4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 8
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - app_internal

  leadradar-worker:
    build:
      context: .
      dockerfile: apps/leadradar-worker/Dockerfile
    container_name: ai-sales-leadradar-worker
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      LEADRADAR_WORKER_PORT: 8092
      LEADRADAR_WORKER_CONCURRENCY: ${LEADRADAR_WORKER_CONCURRENCY:-4}
      LEADRADAR_MULTI_CHAT_DEDUPE_WINDOW_HOURS: ${LEADRADAR_MULTI_CHAT_DEDUPE_WINDOW_HOURS:-3}
      LEADRADAR_MULTI_CHAT_SCORE_BONUS: ${LEADRADAR_MULTI_CHAT_SCORE_BONUS:-35}
    expose:
      - "8092"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:8092/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 8
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - app_internal

  telegram-worker:
    build:
      context: .
      dockerfile: apps/telegram-worker/Dockerfile
    container_name: ai-sales-telegram-worker
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      TELEGRAM_WORKER_HOST: 0.0.0.0
      TELEGRAM_WORKER_PORT: 8080
      TELEGRAM_INITIAL_DIALOG_LIMIT: ${TELEGRAM_INITIAL_DIALOG_LIMIT:-100}
      TELEGRAM_INITIAL_MESSAGES_PER_DIALOG: ${TELEGRAM_INITIAL_MESSAGES_PER_DIALOG:-50}
      TELEGRAM_WORKER_CONCURRENCY: ${TELEGRAM_WORKER_CONCURRENCY:-2}
      API_INTERNAL_URL: http://api:4000
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/health').status == 200 else 1)\""]
      interval: 20s
      timeout: 5s
      retries: 8
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - app_internal

  ai-worker:
    build:
      context: .
      dockerfile: apps/ai-worker/Dockerfile
    container_name: ai-sales-ai-worker
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      AI_WORKER_PORT: 8090
      API_INTERNAL_URL: http://api:4000
      AI_REQUEST_TIMEOUT_MS: ${AI_REQUEST_TIMEOUT_MS:-12000}
      AI_WORKER_CONCURRENCY: ${AI_WORKER_CONCURRENCY:-2}
      TELEGRAM_WORKER_CONCURRENCY: ${TELEGRAM_WORKER_CONCURRENCY:-2}
    expose:
      - "8090"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:8090/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 8
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - app_internal

  postgres:
    image: postgres:16-alpine
    container_name: ai-sales-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_sales_assistant}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ai_sales_assistant}"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - app_internal

  postgres-backup:
    image: postgres:16-alpine
    container_name: ai-sales-postgres-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-ai_sales_assistant}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      BACKUP_DIR: /backups
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      POSTGRES_BACKUP_INTERVAL_SECONDS: ${POSTGRES_BACKUP_INTERVAL_SECONDS:-86400}
    volumes:
      - ./scripts/backup-postgres.sh:/scripts/backup-postgres.sh:ro
      - postgres_backups:/backups
    command:
      [
        "/bin/sh",
        "-c",
        "while true; do /bin/sh /scripts/backup-postgres.sh; sleep ${POSTGRES_BACKUP_INTERVAL_SECONDS}; done"
      ]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - app_internal

  redis:
    image: redis:7-alpine
    container_name: ai-sales-redis
    restart: unless-stopped
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./deploy/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - app_internal

  certbot:
    image: certbot/certbot:latest
    container_name: ai-sales-certbot
    profiles: ["ops"]
    volumes:
      - certbot_www:/var/www/certbot
      - letsencrypt_certs:/etc/letsencrypt
    command: >
      certonly --webroot
      --webroot-path=/var/www/certbot
      --email ${SSL_EMAIL}
      --agree-tos
      --no-eff-email
      -d ${APP_DOMAIN}

volumes:
  postgres_data:
  redis_data:
  postgres_backups:
  certbot_www:
  letsencrypt_certs:

networks:
  public:
    driver: bridge
  app_internal:
    driver: bridge
